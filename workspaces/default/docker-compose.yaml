name: archipellabs-default

networks:
  # This entrypoint OWNS the shared network: `docker compose up` creates it with a
  # pinned subnet (matching PrestaShop's PS_TRUSTED_PROXIES) — no manual
  # `docker network create` needed. The included stacks (ecommerce, tracking) do
  # NOT redeclare it (an included `external: true` would win the include merge and
  # stop the entrypoint from creating it); their services just attach. The
  # simulator, run separately, references it as `external` — so bring the
  # storefront up first.
  archipellabs_default_net:
    name: archipellabs_default_net
    ipam:
      config:
        - subnet: 172.31.0.0/24

include:
  - path: docker-compose-ecommerce.yaml
  - path: docker-compose-tracking.yaml
  # The simulator stack — brings up only the activity database (simulatordb); the
  # simulator app itself is deferred and run locally (see the file's header).
  - path: docker-compose-simulator.yaml

services:
  # Shared reverse-proxy / TLS gateway. It fronts BOTH included stacks — the
  # storefront (/) and Matomo (/stats/) — so it lives on the entrypoint rather
  # than inside either sub-stack.
  gateway:
    container_name: gateway
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/gateway/certs:/etc/nginx/certs:ro
    depends_on:
      - prestashop
      - matomo
    networks:
      - archipellabs_default_net