# /etc/nginx/conf.d/default.conf
# Full config: HTTP -> HTTPS redirect + HTTPS reverse proxy to PrestaShop
# Includes extra headers so PrestaShop/Symfony reliably detects HTTPS behind the proxy.

# Redirect all HTTP traffic to HTTPS
server {
  listen 80;
  server_name localhost;

  return 301 https://$host$request_uri;
}

# HTTPS reverse proxy
server {
  listen 443 ssl;
  server_name localhost;

  # Self-signed (dev) cert paths inside the nginx container
  ssl_certificate     /etc/nginx/certs/localhost.crt;
  ssl_certificate_key /etc/nginx/certs/localhost.key;

  # Reasonable TLS defaults for local/dev
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Allow bigger uploads (modules/images)
  client_max_body_size 50m;

  # Optional: tighter timeouts (tune as needed)
  proxy_connect_timeout 30s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;

  # Matomo analytics on the same origin so the tracker (matomo.js / matomo.php)
  # loads without mixed-content. The trailing slash strips the /stats/ prefix, so
  # Matomo serves its endpoints at the paths the tracker requests.
  location /stats/ {
    proxy_pass http://matomo:80/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host  $host;
  }

  # Proxy everything else (covers /admin-api too)
  location / {
    proxy_pass http://prestashop;
    proxy_http_version 1.1;

    # Preserve host + client info
    proxy_set_header Host                 $host;
    proxy_set_header X-Real-IP            $remote_addr;
    proxy_set_header X-Forwarded-For      $proxy_add_x_forwarded_for;

    # Critical: make upstream detect HTTPS properly
    proxy_set_header X-Forwarded-Proto    https;
    proxy_set_header X-Forwarded-Port     443;
    proxy_set_header X-Forwarded-Host     $host;

    # Legacy hint (some stacks still read this)
    proxy_set_header HTTPS                on;

    # If upstream uses keep-alive / websockets (usually not needed here, but harmless)
    proxy_set_header Connection           "";
  }
}
