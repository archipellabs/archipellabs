name: portal CI

on:
  push:
    branches: [main]
    paths:
      - "portal/**"
      - ".github/workflows/portal-ci.yml"
  pull_request:
    paths:
      - "portal/**"
      - ".github/workflows/portal-ci.yml"

concurrency:
  group: portal-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal/backend
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: portal/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build # tsc typecheck + vite build
